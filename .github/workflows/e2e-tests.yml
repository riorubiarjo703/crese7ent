name: E2E Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'next.config.*', 'src/**', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build application
        env:
          NODE_ENV: test
          E2E_TEST: true
          NEXT_TELEMETRY_DISABLED: 1
          PAYLOAD_SECRET: e2e-payload-secret
          MONGODB_URI: mongodb://localhost:27017/payblocks-e2e
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          RESEND_API_KEY: e2e-resend-key
          EMAIL_FROM_ADDRESS: e2e@example.com
          BLOB_READ_WRITE_TOKEN: vercel_blob_rw_DKjcUTRhTILdCKlu_yZwnx8B6gAn0TT4sH4puc9cKA6VVVV
          ADMIN_CLI_SECRET: e2e-admin-cli-secret
        run: pnpm build

      - name: Run E2E tests
        env:
          CI: true
          NODE_ENV: test
          E2E_TEST: true
          NEXT_TELEMETRY_DISABLED: 1
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PAYLOAD_SECRET: e2e-payload-secret
          MONGODB_URI: mongodb://localhost:27017/payblocks-e2e
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          RESEND_API_KEY: e2e-resend-key
          EMAIL_FROM_ADDRESS: e2e@example.com
          BLOB_READ_WRITE_TOKEN: vercel_blob_rw_DKjcUTRhTILdCKlu_yZwnx8B6gAn0TT4sH4puc9cKA6VVVV
          ADMIN_CLI_SECRET: e2e-admin-cli-secret
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
